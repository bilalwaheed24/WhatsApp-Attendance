name: WhatsApp Attendance

on:
  schedule:
    - cron: '0 2 * * 1-5'
  workflow_dispatch:

jobs:
  send-attendance:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore session
        env:
          WA_SESSION: ${{ secrets.WA_SESSION }}
        run: |
          mkdir -p auth_info
          if [ -n "$WA_SESSION" ]; then
            printf '%s' "$WA_SESSION" | base64 -d > session.tar.gz
          elif [ -f session_b64.txt ]; then
            cat session_b64.txt > session.tar.gz.base64
            base64 -d session.tar.gz.base64 > session.tar.gz
          else
            echo "No WhatsApp session available"
            exit 1
          fi
          tar -xzf session.tar.gz -C .

      - name: Send attendance
        env:
          GROUP_JID: ${{ secrets.GROUP_JID }}
          WA_SESSION: ${{ secrets.WA_SESSION }}
        run: node send.js
