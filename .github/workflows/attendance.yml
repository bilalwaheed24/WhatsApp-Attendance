name: WhatsApp Attendance

on:
  schedule:
    - cron: '0 2 * * 1-5'
  workflow_dispatch:

jobs:
  send-attendance:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Extract session
        run: |
          mkdir -p auth_info
          cat session_b64.txt | base64 -d | tar -xzf - -C .
          echo "Session extracted"

      - name: Send message
        env:
          GROUP_JID: ${{ secrets.GROUP_JID }}
        timeout-minutes: 2
        run: |
          set -e
          echo "Sending attendance message to: $GROUP_JID"
          timeout 30 node send.js || true
          echo "Done"
