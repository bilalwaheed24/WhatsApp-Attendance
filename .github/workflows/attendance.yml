name: WhatsApp Attendance

on:
  schedule:
    - cron: '0 2 * * 1-5'
  workflow_dispatch:

jobs:
  send-attendance:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore session from secret
        env:
          WA_SESSION: ${{ secrets.WA_SESSION }}
        run: |
          if [ -z "$WA_SESSION" ]; then
            echo "WA_SESSION secret is not set"
            exit 1
          fi
          mkdir -p auth_info
          printf '%s' "$WA_SESSION" | base64 -d > session.tar.gz
          tar -xzf session.tar.gz -C .

      - name: Send attendance
        env:
          GROUP_JID: ${{ secrets.GROUP_JID }}
        run: node send.js
